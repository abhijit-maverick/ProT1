<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maverick Pro — Signal Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>


  :root {
    --bg: #ffffff;
    --surface: #f0f4f8;
    --surface-2: #f8fafc;
    --text: #0f172a;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --border: #e2e8f0;
    --border-strong: #cbd5e1;
    --teal: #0891b2;
    --teal-soft: #ecfeff;
    --teal-border: #a5f3fc;
    --green: #059669;
    --green-soft: #ecfdf5;
    --green-border: #a7f3d0;
    --red: #dc2626;
    --red-soft: #fef2f2;
    --red-border: #fecaca;
    --amber: #d97706;
    --amber-soft: #fffbeb;
    --amber-border: #fcd34d;
    --purple: #7c3aed;
    --purple-soft: #f5f3ff;
    --purple-border: #ddd6fe;
    --blue: #2563eb;
    --blue-soft: #eff6ff;
    --blue-border: #bfdbfe;
    --indigo: #4f46e5;
    --indigo-soft: #eef2ff;
    --indigo-border: #c7d2fe;
    --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
    --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.06), 0 1px 3px rgba(15, 23, 42, 0.04);
    --shadow-lg: 0 12px 32px rgba(15, 23, 42, 0.08), 0 2px 6px rgba(15, 23, 42, 0.04);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--surface);
    color: var(--text);
    font-family: 'Outfit', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv11";
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "tnum", "ss01"; }

  /* --------- Header --------- */
  .app-header {
    position: sticky; top: 0; z-index: 30;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 28px; height: 28px; border-radius: 7px;
    background: linear-gradient(135deg, #0891b2 0%, #0e7490 100%);
    display: grid; place-items: center;
    color: white; font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; letter-spacing: -0.5px;
    box-shadow: 0 1px 2px rgba(8, 145, 178, 0.3), inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .brand-name { font-weight: 600; font-size: 16px; letter-spacing: -0.01em; }
  .brand-sub {
    color: var(--text-muted); font-size: 12px; margin-left: 8px;
    padding-left: 12px; border-left: 1px solid var(--border);
  }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .date-chip { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 10px; }
  .date-chip .market-clock {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text); font-size: 12px; font-weight: 500;
  }
  .status-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px 6px 10px;
    background: var(--green-soft); border: 1px solid var(--green-border);
    border-radius: 999px; color: var(--green);
    font-size: 12px; font-weight: 500;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--green);
    animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(5,150,105, 0.45); }
    50% { box-shadow: 0 0 0 6px rgba(5,150,105, 0); }
  }

  /* --------- Tab Bar --------- */
  .tab-bar {
    position: sticky; top: 57px; z-index: 25;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex; align-items: center; gap: 2px;
    overflow-x: auto;
  }
  .tab {
    background: transparent; border: none;
    padding: 14px 16px 13px;
    font-family: inherit; font-size: 13px; font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    display: inline-flex; align-items: center; gap: 8px;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    margin-bottom: -1px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--teal); border-bottom-color: var(--teal); }
  .tab .tab-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600;
    padding: 2px 6px; border-radius: 4px;
    background: var(--surface); color: var(--text-muted);
  }
  .tab.active .tab-count { background: var(--teal-soft); color: var(--teal); }
  .tab.warn .tab-count { background: var(--amber-soft); color: var(--amber); }

  .tab-group-divider {
    width: 1px; height: 20px; background: var(--border);
    margin: 0 8px;
  }

  /* --------- Filter Bar --------- */
  .filter-bar {
    position: sticky; top: 108px; z-index: 20;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 32px;
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap;
  }
  .search { flex: 0 0 280px; position: relative; }
  .search input {
    width: 100%; height: 36px;
    padding: 0 12px 0 36px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 8px;
    font-family: inherit; font-size: 13px; color: var(--text);
    outline: none; transition: all 0.15s;
  }
  .search input::placeholder { color: var(--text-dim); }
  .search input:focus {
    background: white; border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.1);
  }
  .search svg {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    color: var(--text-dim);
  }

  .seg {
    display: inline-flex;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 3px; gap: 2px;
  }
  .seg button {
    background: transparent; border: none;
    padding: 5px 12px;
    font-family: inherit; font-size: 12px; font-weight: 500;
    color: var(--text-muted); border-radius: 6px;
    cursor: pointer; transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .seg button:hover { color: var(--text); }
  .seg button.active {
    background: white; color: var(--text);
    box-shadow: var(--shadow-sm);
  }
  .seg button.active.long { color: var(--green); }
  .seg button.active.short { color: var(--red); }
  .seg button.active.tf { color: var(--teal); }

  .seg-label {
    font-size: 11px; color: var(--text-muted); font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-right: 6px;
  }
  .seg-wrap { display: inline-flex; align-items: center; }

  .conf-filter {
    display: flex; align-items: center; gap: 12px;
    margin-left: auto;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 14px;
  }
  .conf-filter label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .conf-slider {
    -webkit-appearance: none; appearance: none;
    width: 140px; height: 4px;
    background: var(--border); border-radius: 999px;
    outline: none;
  }
  .conf-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px;
    background: white; border: 2px solid var(--teal);
    border-radius: 50%; cursor: pointer;
    box-shadow: 0 1px 3px rgba(8, 145, 178, 0.3);
  }
  .conf-slider::-moz-range-thumb {
    width: 14px; height: 14px;
    background: white; border: 2px solid var(--teal);
    border-radius: 50%; cursor: pointer;
  }
  .conf-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 600; color: var(--text);
    min-width: 28px; text-align: right;
  }

  /* --------- Layout --------- */
  .page { max-width: 1280px; margin: 0 auto; padding: 20px 32px 60px; }

  .list-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin: 4px 4px 12px;
  }
  .list-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .list-title .count { color: var(--text-muted); font-weight: 500; margin-left: 6px; }
  .list-meta {
    font-size: 11px; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    display: flex; align-items: center; gap: 6px;
  }
  .refresh-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); animation: pulse 2s infinite;
  }

  /* --------- Signal Rows --------- */
  .signal-list { display: flex; flex-direction: column; gap: 8px; }
  .signal {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s, border-color 0.2s;
    overflow: hidden;
  }
  .signal:hover { box-shadow: var(--shadow-md); border-color: var(--border-strong); }
  .signal.expanded { border-left: 3px solid var(--teal); box-shadow: var(--shadow-md); }
  .signal.dual { border-left: 3px solid var(--indigo); }
  .signal.dual.expanded { border-left: 3px solid var(--teal); }

  .signal-row {
    display: grid;
    grid-template-columns: 1fr 150px 90px 80px 130px 110px 32px;
    align-items: center; gap: 18px;
    padding: 16px 20px;
    cursor: pointer;
  }
  .signal.expanded .signal-row, .signal.dual .signal-row { padding-left: 18px; }

  .sym-block { min-width: 0; display: flex; align-items: center; gap: 12px; }
  .sym-icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--surface); border: 1px solid var(--border);
    display: grid; place-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    flex-shrink: 0;
  }
  .sym-icon.index {
    background: linear-gradient(135deg, var(--indigo-soft), var(--purple-soft));
    border-color: var(--indigo-border);
    color: var(--indigo);
  }
  .sym-icon.commodity {
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    border-color: #fcd34d;
    color: #92400e;
  }
  .sym-text { min-width: 0; }
  .sym {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 16px;
    letter-spacing: -0.01em; color: var(--text); line-height: 1.2;
    display: flex; align-items: center; gap: 6px;
  }
  .sym-expiry {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600;
    padding: 1px 5px; border-radius: 3px;
    background: var(--amber-soft); color: var(--amber);
    border: 1px solid var(--amber-border);
  }
  .co-name {
    font-size: 12px; color: var(--text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* Strategy badges */
  .badge-stack {
    display: flex; flex-direction: column; gap: 3px;
    align-items: flex-start;
  }
  .badges-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.02em;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .badge-ema { background: var(--blue-soft); color: var(--blue); border-color: var(--blue-border); }
  .badge-fvg { background: var(--purple-soft); color: var(--purple); border-color: var(--purple-border); }
  .badge-dual {
    background: linear-gradient(90deg, var(--blue-soft), var(--purple-soft));
    color: var(--indigo); border-color: var(--indigo-border);
    font-weight: 700;
  }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .badge-star { width: 10px; height: 10px; }

  .tf-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600;
    color: var(--text-muted);
    padding: 1px 5px;
    background: var(--surface);
    border-radius: 3px;
    letter-spacing: 0.02em;
  }

  .signal-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
  }
  .signal-buy { background: var(--green-soft); color: var(--green); border: 1px solid var(--green-border); }
  .signal-sell { background: var(--red-soft); color: var(--red); border: 1px solid var(--red-border); }

  .ring-wrap { position: relative; width: 52px; height: 52px; display: grid; place-items: center; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { stroke: var(--border); }
  .ring-fg { transition: stroke-dashoffset 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .ring-fg.elite { stroke: var(--indigo); }
  .ring-fg.high { stroke: var(--green); }
  .ring-fg.mid { stroke: var(--amber); }
  .ring-fg.low { stroke: var(--red); }
  .ring-value {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 13px; color: var(--text);
    display: flex; flex-direction: column; align-items: center;
    line-height: 1;
  }
  .ring-value .ring-sub {
    font-size: 7px; font-weight: 500; color: var(--text-dim);
    letter-spacing: 0.05em; margin-top: 1px;
  }
  .ring-value.elite { color: var(--indigo); }

  .price-block { text-align: right; }
  .price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px; font-weight: 700; color: var(--text);
    letter-spacing: -0.02em;
  }
  .price-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-muted); margin-top: 2px;
  }
  .price-sub.up { color: var(--green); }
  .price-sub.down { color: var(--red); }

  .spark-wrap { width: 110px; height: 40px; display: grid; place-items: center; }

  .chevron { color: var(--text-dim); transition: transform 0.3s; }
  .signal.expanded .chevron { transform: rotate(180deg); color: var(--teal); }

  /* --------- Expanded Detail --------- */
  .detail { max-height: 0; overflow: hidden; transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
  .signal.expanded .detail { max-height: 820px; }
  .detail-inner {
    padding: 4px 20px 20px 18px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .detail-section {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .section-title {
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 600; margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-title .hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; text-transform: none; letter-spacing: 0;
    color: var(--text-dim); font-weight: 500;
  }

  .targets-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .target-card {
    background: white; border: 1px solid var(--border);
    border-radius: 6px; padding: 12px;
  }
  .target-card .tc-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-muted); font-weight: 600;
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 5px;
  }
  .tc-dot { width: 6px; height: 6px; border-radius: 50%; }
  .tc-dot.sl { background: var(--red); }
  .tc-dot.t1 { background: var(--amber); }
  .tc-dot.t2 { background: var(--green); }
  .tc-price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px; font-weight: 700; color: var(--text);
  }
  .tc-meta {
    display: flex; justify-content: space-between;
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
  .tc-meta .k { color: var(--text-muted); }
  .tc-meta .v { color: var(--text); font-weight: 600; }
  .tc-meta .v.red { color: var(--red); }
  .tc-meta .v.green { color: var(--green); }

  .breakdown-list { display: flex; flex-direction: column; gap: 10px; }
  .bd-row {
    display: grid; grid-template-columns: 80px 1fr 32px;
    align-items: center; gap: 12px;
  }
  .bd-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .bd-bar {
    height: 6px; background: var(--border);
    border-radius: 999px; overflow: hidden; position: relative;
  }
  .bd-fill { height: 100%; border-radius: 999px; transition: width 0.6s ease; }
  .bd-fill.high { background: var(--green); }
  .bd-fill.mid { background: var(--amber); }
  .bd-fill.low { background: var(--red); }
  .bd-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 600; color: var(--text); text-align: right;
  }

  .calc-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
    background: white; border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
  }
  .calc-cell { padding: 12px; border-right: 1px solid var(--border); }
  .calc-cell:last-child { border-right: none; }
  .calc-k {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-muted); font-weight: 600; margin-bottom: 4px;
  }
  .calc-v {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px; font-weight: 700; color: var(--text);
  }
  .calc-v.accent { color: var(--teal); }
  .calc-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-muted); margin-top: 2px;
  }

  .equity-chart {
    width: 100%; height: 120px;
    background: white; border: 1px solid var(--border);
    border-radius: 6px; padding: 10px; position: relative;
  }
  .equity-stats {
    display: flex; gap: 16px; margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
  }
  .equity-stat { display: flex; flex-direction: column; font-size: 11px; color: var(--text-muted); }
  .equity-stat b { font-size: 13px; color: var(--text); margin-top: 2px; }
  .equity-stat b.up { color: var(--green); }

  .empty-hint {
    text-align: center; padding: 48px 20px;
    color: var(--text-muted); font-size: 13px;
    background: white; border: 1px dashed var(--border-strong);
    border-radius: 8px;
  }

  /* --------- Portfolio --------- */
  .portfolio-header {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    margin-bottom: 16px;
  }
  .pstat {
    background: white; border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px;
  }
  .pstat-k {
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500;
  }
  .pstat-v {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px; font-weight: 700; color: var(--text); margin-top: 4px;
    letter-spacing: -0.01em;
  }
  .pstat-v.up { color: var(--green); }
  .pstat-v.down { color: var(--red); }
  .pstat-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-muted); margin-top: 2px;
  }
  .pstat-sub.up { color: var(--green); }
  .pstat-sub.down { color: var(--red); }

  .position {
    background: white; border: 1px solid var(--border);
    border-radius: 8px; box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s;
    border-left-width: 3px;
  }
  .position:hover { box-shadow: var(--shadow-md); }
  .position.holding { border-left-color: var(--green); }
  .position.warning { border-left-color: var(--amber); }
  .position.exit   { border-left-color: var(--red); }

  .position-row {
    display: grid;
    grid-template-columns: 1fr 110px 120px 120px 80px 140px 110px;
    align-items: center; gap: 16px;
    padding: 14px 18px;
  }
  .pos-status {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
  }
  .pos-status.holding { background: var(--green-soft); color: var(--green); border: 1px solid var(--green-border); }
  .pos-status.warning { background: var(--amber-soft); color: var(--amber); border: 1px solid var(--amber-border); }
  .pos-status.exit { background: var(--red-soft); color: var(--red); border: 1px solid var(--red-border); }
  .pos-status svg { width: 12px; height: 12px; }

  .score-bar-wrap { display: flex; flex-direction: column; gap: 4px; }
  .score-bar-meta {
    display: flex; justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
  .score-bar-meta .now { font-weight: 700; color: var(--text); }
  .score-bar-meta .delta { font-size: 10px; }
  .score-bar-meta .delta.down { color: var(--red); }
  .score-bar-meta .delta.up { color: var(--green); }
  .score-bar-meta .delta.flat { color: var(--text-muted); }

  const toDate   = today.toISOString().slice(0,10);
  const url = 'https://apiconnect.angelbroking.com/rest/secure/angelbroking/historical/v1/getCandleData';
  const headers = {'Content-Type':'application/json','Accept':'application/json','Authorization':'Bearer '+jwtToken,'X-UserType':'USER','X-SourceID':'WEB','X-ClientLocalIP':'127.0.0.1','X-ClientPublicIP':'127.0.0.1','X-MACAddress':'00:00:00:00:00:00','X-PrivateKey':apiKey};
  const body = {exchange, symboltoken:tok, interval:tf, fromdate:fromDate+' 09:00', todate:toDate+' 15:30'};
  try {
    const d = await proxyFetch(url, headers, body);
    return (d.status && d.data) ? d.data : null;
  } catch(e) { return null; }
}

async function fetchCandlesIncremental(sym, tok, tf) {
  const cache = loadCandleCache();
  const key = sym + '_' + tf;
  const existing = cache[key] || {candles:[], last_ts: null};

  // Determine date range
  const today = new Date();
  const daysNeeded = tf === 'FIFTEEN_MINUTE' ? 30 : 60; // extended for more warmup candles
  let fromDate, toDate = today.toISOString().slice(0,10);

  if (existing.last_ts) {
    // Incremental: only fetch since last candle
    const lastDate = new Date(existing.last_ts);
    lastDate.setMinutes(lastDate.getMinutes() + (tf === 'FIFTEEN_MINUTE' ? 15 : 60));
    fromDate = lastDate.toISOString().slice(0,10);
    // If last candle is today, no need to fetch
    if (fromDate > toDate) return existing.candles;
  } else {
    const from = new Date();
    from.setDate(from.getDate() - daysNeeded);
    fromDate = from.toISOString().slice(0,10);
  }

  const data = await fetchHistory(sym, tok, fromDate, toDate, tf);
  if (!data || data.length === 0) return existing.candles;

  // Deduplicate and append
  const existingTs = new Set(existing.candles.map(c => c[0]));
  const newCandles = data.filter(c => !existingTs.has(c[0]));

  const allCandles = [...existing.candles, ...newCandles]
    .sort((a,b) => a[0] < b[0] ? -1 : 1);

  // Keep only last daysNeeded days
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - daysNeeded);
  const filtered = allCandles.filter(c => new Date(c[0]) >= cutoff);

  // Update cache
  const updatedCache = loadCandleCache();
  updatedCache[key] = {
    candles: filtered,
    last_ts: filtered[filtered.length-1]?.[0] || existing.last_ts
  };
  saveCandleCache(updatedCache);

  return filtered;
}

/* -- Signal Detection Engine -- */
function detectSignals(candles, sym, tf) {
  if (!candles || candles.length < 55) return null;

  var data = candles.map(function(c) {
    return {t: c[0].slice(0,16), o: c[1], h: c[2], l: c[3], c: c[4], v: c[5]};
  });
  var closes = data.map(function(d){return d.c;});
  var highs  = data.map(function(d){return d.h;});
  var lows   = data.map(function(d){return d.l;});
  var volumes= data.map(function(d){return d.v;});
  var n = data.length;
  var i = n - 1;

  function emaCalc(arr, p) {
    var r = new Array(arr.length).fill(null);
    if (arr.length < p) return r;
    var sum = 0;
    for (var j=0;j<p;j++) sum += arr[j];
    r[p-1] = sum/p;
    var k = 2/(p+1);
    for (var j=p;j<arr.length;j++) r[j] = arr[j]*k + r[j-1]*(1-k);
    return r;
  }

  var e20  = emaCalc(closes, 20);
  var e50  = emaCalc(closes, 50);
  var e200 = emaCalc(closes, 200);
  if (!e20[i] || !e50[i]) return null;

  var avgVol = 0;
  var volCount = Math.min(20, i);
  for (var vi=i-volCount;vi<i;vi++) avgVol += volumes[vi];
  avgVol = avgVol / volCount || 1;

  // RSI
  var rsi = null;
  if (i >= 14) {
    var gains=0, losses=0;
    for (var ri=i-14;ri<i;ri++) {
      var diff = closes[ri+1]-closes[ri];
      if (diff>0) gains+=diff; else losses-=diff;
    }
    var ag=gains/14, al=losses/14;
    rsi = al===0 ? 100 : 100-(100/(1+ag/al));
  }

  // Pivot highs/lows (5-bar)
  var sw=5, lastPH=null, lastPL=null;
  for (var pi=sw;pi<i-sw;pi++) {
    var isHighest=true, isLowest=true;
    for (var pj=pi-sw;pj<=pi+sw;pj++) {
      if (pj===pi) continue;
      if (highs[pj]>=highs[pi]) isHighest=false;
      if (lows[pj]<=lows[pi]) isLowest=false;
    }
    if (isHighest) lastPH={price:highs[pi],idx:pi};
    if (isLowest)  lastPL={price:lows[pi],idx:pi};
  }

  var signals = [];
  var entry = closes[i];
  var isUp   = e20[i]>e50[i] && (e200[i] ? closes[i]>e200[i] : true);
  var isDn   = e20[i]<e50[i] && (e200[i] ? closes[i]<e200[i] : true);

  // ── EMA 20 PULLBACK LONG ──
  if (isUp && i>1) {
    var touched = lows[i]<=e20[i]*1.003 && highs[i]>=e20[i]*0.997;
    var bullCandle = closes[i]>data[i].o;
    var volOk = volumes[i]>avgVol*1.1;
    var prevDn = closes[i-1]<closes[i-2];
    if (touched && bullCandle && prevDn) {
      var sl = Math.min(lows[i], e20[i]) * 0.998;
      var risk = entry-sl;
      var conf = 50 + (isUp?15:0) + (touched?15:0) + (volOk?10:0) + (e50[i]>e50[i-1]?10:0);
      signals.push({strategy:'EMA 20',dir:'LONG',entry:entry,
        sl:Math.round(sl*100)/100, t1:Math.round((entry+risk*1.5)*100)/100, t2:Math.round((entry+risk*3)*100)/100,
        confidence:Math.min(95,conf), riskPct:Math.round(risk/entry*10000)/100,
        breakdown:{trend:isUp?90:30,pullback:touched?90:40,volume:volOk?85:55,structure:e50[i]>e50[i-1]?80:50}});
    }
  }

  // ── EMA 20 SHORT ──
  if (isDn && i>1) {
    var touchedDn = lows[i]<=e20[i]*1.003 && highs[i]>=e20[i]*0.997;
    var bearCandle = closes[i]<data[i].o;
    var volOkDn = volumes[i]>avgVol*1.1;
    var prevUp = closes[i-1]>closes[i-2];
    if (touchedDn && bearCandle && prevUp) {
      var slDn = Math.max(highs[i], e20[i]) * 1.002;
      var riskDn = slDn-entry;
      var confDn = 50 + (isDn?15:0) + (touchedDn?15:0) + (volOkDn?10:0);
      signals.push({strategy:'EMA 20',dir:'SHORT',entry:entry,
        sl:Math.round(slDn*100)/100, t1:Math.round((entry-riskDn*1.5)*100)/100, t2:Math.round((entry-riskDn*3)*100)/100,
        confidence:Math.min(95,confDn), riskPct:Math.round(riskDn/entry*10000)/100,
        breakdown:{trend:isDn?85:30,pullback:touchedDn?85:40,volume:volOkDn?85:55,structure:50}});
    }
  }

  // ── FVG + BOS LONG ──
  if (lastPH && i>=2) {
    var bos = closes[i]>lastPH.price && closes[i-1]<=lastPH.price;
    if (bos) {
      for (var fi=Math.max(2,i-15);fi<i-1;fi++) {
        var fvgTop=lows[fi+1], fvgBot=highs[fi-1];
        if (fvgTop>fvgBot && (fvgTop-fvgBot)>0.3) {
          var fsize=fvgTop-fvgBot;
          var e62=Math.round((fvgTop-fsize*0.62)*100)/100;
          var fsl=Math.round(fvgBot*0.999*100)/100;
          var frisk=e62-fsl;
          if (frisk>0) {
            var fvOk=volumes[i]>avgVol*1.2;
            var fconf=65+(fvOk?15:0)+(e50[i]&&closes[i]>e50[i]?10:0);
            signals.push({strategy:'FVG+BOS',dir:'LONG',entry:e62,
              sl:fsl, t1:Math.round((e62+frisk*1.5)*100)/100, t2:Math.round(lastPH.price*1.005*100)/100,
              confidence:Math.min(95,fconf), riskPct:Math.round(frisk/e62*10000)/100,
              fvgZone:{top:Math.round(fvgTop*100)/100,bot:Math.round(fvgBot*100)/100},
              breakdown:{trend:e200[i]&&closes[i]>e200[i]?90:70,pullback:85,volume:fvOk?90:60,structure:88}});
            break;
          }
        }
      }
    }
  }

  // ── FVG + BOS SHORT ──
  if (lastPL && i>=2) {
    var bosS = closes[i]<lastPL.price && closes[i-1]>=lastPL.price;
    if (bosS) {
      for (var fsi=Math.max(2,i-15);fsi<i-1;fsi++) {
        var fvgBotS=highs[fsi+1], fvgTopS=lows[fsi-1];
        if (fvgBotS<fvgTopS && (fvgTopS-fvgBotS)>0.3) {
          var fsizeS=fvgTopS-fvgBotS;
          var e62S=Math.round((fvgBotS+fsizeS*0.62)*100)/100;
          var fslS=Math.round(fvgTopS*1.001*100)/100;
          var friskS=fslS-e62S;
          if (friskS>0) {
            var fvOkS=volumes[i]>avgVol*1.2;
            var fconfS=65+(fvOkS?15:0)+(e50[i]&&closes[i]<e50[i]?10:0);
            signals.push({strategy:'FVG+BOS',dir:'SHORT',entry:e62S,
              sl:fslS, t1:Math.round((e62S-friskS*1.5)*100)/100, t2:Math.round(lastPL.price*0.995*100)/100,
              confidence:Math.min(95,fconfS), riskPct:Math.round(friskS/e62S*10000)/100,
              breakdown:{trend:e200[i]&&closes[i]<e200[i]?90:70,pullback:85,volume:fvOkS?90:60,structure:88}});
            break;
          }
        }
      }
    }
  }

  // ── SMC OB + BOS LONG ──
  if (i>=5) {
    var smcBear = closes[i-2]<data[i-2].o;
    var smcBull = closes[i]>data[i].o && (closes[i]-data[i].o)/(highs[i]-lows[i]||1)>0.6;
    var recentH = highs[Math.max(0,i-8)];
    for (var rhi=i-7;rhi<i;rhi++) if(highs[rhi]>recentH) recentH=highs[rhi];
    var smcBos  = closes[i]>recentH && (closes[i-1]<=recentH || closes[i-2]<=recentH || closes[i-3]<=recentH);
    var smcVol  = volumes[i]>avgVol*1.1;
    if (smcBear && smcBull && smcBos && isUp) {
      var smcSl = Math.round(lows[i-2]*0.999*100)/100;
      var smcRisk = entry-smcSl;
      if (smcRisk>0 && smcRisk/entry<0.03) {
        var smcConf = 60+(isUp?12:0)+(smcVol?12:0)+(e200[i]&&closes[i]>e200[i]?8:0)+(smcBos?8:0);
        signals.push({strategy:'SMC',dir:'LONG',entry:entry,
          sl:smcSl, t1:Math.round((entry+smcRisk*1.5)*100)/100, t2:Math.round((entry+smcRisk*2.5)*100)/100,
          confidence:Math.min(95,smcConf), riskPct:Math.round(smcRisk/entry*10000)/100,
          breakdown:{trend:isUp?88:30,pullback:smcBos?85:50,volume:smcVol?90:55,structure:smcBear&&smcBull?85:50}});
      }
    }
  }

  // ── SMC OB + BOS SHORT ──
  if (i>=5) {
    var smcBullS = closes[i-2]>data[i-2].o;
    var smcBearS = closes[i]<data[i].o && (data[i].o-closes[i])/(highs[i]-lows[i]||1)>0.6;
    var recentL  = lows[Math.max(0,i-8)];
    for (var rli=i-7;rli<i;rli++) if(lows[rli]<recentL) recentL=lows[rli];
    var smcBosS  = closes[i]<recentL && (closes[i-1]>=recentL || closes[i-2]>=recentL || closes[i-3]>=recentL);
    var smcVolS  = volumes[i]>avgVol*1.1;
    if (smcBullS && smcBearS && smcBosS && isDn) {
      var smcSlS  = Math.round(highs[i-2]*1.001*100)/100;
      var smcRiskS= smcSlS-entry;
      if (smcRiskS>0 && smcRiskS/entry<0.03) {
        var smcConfS= 60+(isDn?12:0)+(smcVolS?12:0)+(e200[i]&&closes[i]<e200[i]?8:0)+(smcBosS?8:0);
        signals.push({strategy:'SMC',dir:'SHORT',entry:entry,
          sl:smcSlS, t1:Math.round((entry-smcRiskS*1.5)*100)/100, t2:Math.round((entry-smcRiskS*2.5)*100)/100,
          confidence:Math.min(95,smcConfS), riskPct:Math.round(smcRiskS/entry*10000)/100,
          breakdown:{trend:isDn?88:30,pullback:smcBosS?85:50,volume:smcVolS?90:55,structure:smcBullS&&smcBearS?85:50}});
      }
    }
  }

  if (signals.length === 0) return null;

  // Group by direction, apply dual/triple boost
  var dirs = {};
  signals.forEach(function(s) {
    if (!dirs[s.dir]) dirs[s.dir] = [];
    dirs[s.dir].push(s);
  });

  var results = [];
  Object.keys(dirs).forEach(function(dir) {
    var sigs = dirs[dir];
    var dual   = sigs.length >= 2;
    var triple = sigs.length >= 3;
    var baseConf = Math.round(sigs.reduce(function(a,s){return a+s.confidence;},0)/sigs.length);
    var boosted  = triple ? Math.min(99,baseConf+18) : dual ? Math.min(99,baseConf+12) : baseConf;
    sigs.sort(function(a,b){return b.confidence-a.confidence;});
    var best = sigs[0];
    var strats = sigs.map(function(s){return s.strategy;}).filter(function(v,i,a){return a.indexOf(v)===i;});
    results.push({
      id: sym+'-'+tf+'-'+dir,
      symbol:sym, name:sym, kind:'stock',
      strategies:strats, dual:dual, triple:triple,
      dir:dir, signal:dir==='LONG'?'BUY':'SELL',
      confidence:boosted, baseConfidence:baseConf,
      timeframe:tf==='FIFTEEN_MINUTE'?'15m':'1h',
      entry:best.entry, sl:best.sl, t1:best.t1, t2:best.t2,
      riskPct:best.riskPct, breakdown:best.breakdown,
      fvgZone:best.fvgZone||null,
      sector:SECTOR_MAP[sym]||'Other',
      change:Math.round((closes[i]-closes[i-1])/closes[i-1]*10000)/100,
      sparkPoints:closes.slice(-30),
      win:0.58, seed:sym.charCodeAt(0)*7,
      timeAgo:'just now', isLive:true,
    });
  });
  return results;
}

/* -- Portfolio storage -- */
function loadPortfolio() {
  try { const r = localStorage.getItem('mvk_portfolio_v1'); return r ? JSON.parse(r) : []; }
  catch(e) { return []; }
}
function savePortfolio(p) {
  localStorage.setItem('mvk_portfolio_v1', JSON.stringify(p));
}
function updatePortfolioPrices() {
  const port = loadPortfolio();
  if (!port.length) return;
  const cache = loadCandleCache();
  let updated = false;
  port.forEach(pos => {
    const ce = cache[pos.symbol+'_FIFTEEN_MINUTE'] || cache[pos.symbol+'_ONE_HOUR'];
    if (ce && ce.candles && ce.candles.length > 0) {
      const price = ce.candles[ce.candles.length-1][4];
      if (price && price !== pos.current) {
        pos.current = price;
        const isLong = pos.dir === 'LONG';
        pos.status = isLong
          ? (price <= pos.sl ? 'exit' : price <= pos.entry*0.98 ? 'warning' : 'holding')
          : (price >= pos.sl ? 'exit' : price >= pos.entry*1.02 ? 'warning' : 'holding');
        updated = true;
      }
    }
  });
  if (updated) { savePortfolio(port); window.__portfolio = port; }
}

/* -- Export Portfolio to CSV -- */
function exportPortfolioCSV() {
  const port = loadPortfolio();
  if (!port.length) { alert('No positions to export'); return; }
  const headers = ['Symbol','Direction','Strategy','TF','Entry ₹','SL ₹','T1 ₹','T2 ₹','Qty','Entry Time','Status','Current ₹','P&L ₹','P&L %'];
  const rows = port.map(p => {
    const isLong = p.dir === 'LONG';
    const pnl = (p.current - p.entry) * p.qty * (isLong ? 1 : -1);
    const pnlPct = ((p.current - p.entry) / p.entry) * 100 * (isLong ? 1 : -1);
    return [
      p.symbol, p.dir, (p.strategies||[]).join('+'), p.tf,
      p.entry.toFixed(2), p.sl.toFixed(2), p.t1.toFixed(2), p.t2.toFixed(2),
      p.qty, p.entryTime, p.status, p.current.toFixed(2),
      pnl.toFixed(0), pnlPct.toFixed(2)+'%'
    ];
  });
  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'maverick_portfolio_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click(); URL.revokeObjectURL(url);
}

/* ── Opening Range Breakout (ORB) for indices & commodities ── */
function detectORB(candles, sym, tf) {
  if (!candles || candles.length < 20) return null;

  // ORB uses first 30 min (2 x 15m candles) as opening range
  // Find today's candles
  var today = new Date().toISOString().slice(0, 10);
  var todayCandles = candles.filter(function(c) { return c[0].slice(0,10) === today; });

  // If market not open today, use last trading day
  if (todayCandles.length < 2) {
    var lastDay = candles[candles.length-1][0].slice(0,10);
    todayCandles = candles.filter(function(c) { return c[0].slice(0,10) === lastDay; });
  }
  if (todayCandles.length < 3) return null;

  // Opening range = first 2 candles (first 30 min)
  var orbHigh = Math.max(todayCandles[0][2], todayCandles[1][2]);
  var orbLow  = Math.min(todayCandles[0][3], todayCandles[1][3]);
  var orbRange = orbHigh - orbLow;
  if (orbRange <= 0) return null;

  // Current candle
  var curr = todayCandles[todayCandles.length - 1];
  var currClose = curr[4];
  var currHigh  = curr[2];
  var currLow   = curr[3];

  // Volume confirmation
  var avgVol = 0;
  for (var vi = Math.max(0, candles.length-20); vi < candles.length-1; vi++) avgVol += candles[vi][5];
  avgVol = avgVol / Math.min(20, candles.length-1) || 1;
  var volSpike = curr[5] > avgVol * 1.2;

  // ORB Long: close above opening range high
  if (currClose > orbHigh && currHigh > orbHigh) {
    var sl  = orbLow;
    var risk = currClose - sl;
    var conf = 65 + (volSpike ? 15 : 0) + (orbRange/currClose < 0.01 ? 10 : 0); // tight ORB = higher conf
    return {
      strategy: 'ORB', dir: 'LONG', signal: 'BUY',
      entry: currClose, sl: Math.round(sl*100)/100,
      t1: Math.round((currClose + risk * 1.5)*100)/100,
      t2: Math.round((currClose + risk * 2.5)*100)/100,
      confidence: Math.min(92, conf),
      orbHigh: Math.round(orbHigh*100)/100,
      orbLow: Math.round(orbLow*100)/100,
      riskPct: Math.round(risk/currClose*10000)/100,
      breakdown: {trend:70, pullback:orbRange/currClose<0.01?85:65, volume:volSpike?90:55, structure:80},
      note: 'ORB breakout above ' + orbHigh.toFixed(2),
    };
  }

  // ORB Short: close below opening range low
  if (currClose < orbLow && currLow < orbLow) {
    var slS  = orbHigh;
    var riskS = slS - currClose;
    var confS = 65 + (volSpike ? 15 : 0) + (orbRange/currClose < 0.01 ? 10 : 0);
    return {
      strategy: 'ORB', dir: 'SHORT', signal: 'SELL',
      entry: currClose, sl: Math.round(slS*100)/100,
      t1: Math.round((currClose - riskS * 1.5)*100)/100,
      t2: Math.round((currClose - riskS * 2.5)*100)/100,
      confidence: Math.min(92, confS),
      orbHigh: Math.round(orbHigh*100)/100,
      orbLow: Math.round(orbLow*100)/100,
      riskPct: Math.round(riskS/currClose*10000)/100,
      breakdown: {trend:70, pullback:orbRange/currClose<0.01?85:65, volume:volSpike?90:55, structure:80},
      note: 'ORB breakdown below ' + orbLow.toFixed(2),
    };
  }

  // ORB setup (range formed, no breakout yet)
  return {
    strategy: 'ORB', dir: 'WATCH', signal: 'WATCH',
    entry: currClose,
    sl: Math.round(orbLow*100)/100,
    t1: Math.round((orbHigh + orbRange)*100)/100,
    t2: Math.round((orbHigh + orbRange*2)*100)/100,
    confidence: 55,
    orbHigh: Math.round(orbHigh*100)/100,
    orbLow: Math.round(orbLow*100)/100,
    note: 'ORB range: ' + orbLow.toFixed(2) + ' - ' + orbHigh.toFixed(2) + ' · waiting for breakout',
  };
}

function calcEMA(data, period){
  const k = 2/(period+1);
  const ema = new Array(data.length).fill(null);
  let sum = 0, count = 0;
  for(let i=0;i<data.length;i++){
    if(count < period){ sum += data[i].c; count++; if(count===period) ema[i]=sum/period; }
    else { ema[i] = data[i].c*k + ema[i-1]*(1-k); }
  }
  return ema;
}

/* -- ADX calculator -- */
function calcADX(data, period=14){
  const adx=new Array(data.length).fill(null);
  if(data.length < period*2) return adx;
  const tr=[],pdm=[],ndm=[];
  for(let i=1;i<data.length;i++){
    const h=data[i].h,l=data[i].l,ph=data[i-1].h,pl=data[i-1].l,pc=data[i-1].c;
    tr.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)));
    pdm.push(h-ph>pl-l && h-ph>0?h-ph:0);
    ndm.push(pl-l>h-ph && pl-l>0?pl-l:0);
  }
  let atr=tr.slice(0,period).reduce((a,b)=>a+b,0);
  let pDM=pdm.slice(0,period).reduce((a,b)=>a+b,0);
  let nDM=ndm.slice(0,period).reduce((a,b)=>a+b,0);
  const dx=[];
  for(let i=period;i<tr.length;i++){
    atr=atr-atr/period+tr[i]; pDM=pDM-pDM/period+pdm[i]; nDM=nDM-nDM/period+ndm[i];
    const pDI=100*pDM/atr, nDI=100*nDM/atr;
    dx.push(100*Math.abs(pDI-nDI)/(pDI+nDI||1));
  }
  let adxVal=dx.slice(0,period).reduce((a,b)=>a+b,0)/period;
  adx[period*2]=adxVal;
  for(let i=period+1;i<dx.length;i++){ adxVal=(adxVal*(period-1)+dx[i])/period; adx[period+i]=adxVal; }
  return adx;
}

/* -- swing high/low detector -- */
function isUptrend(data, i, ema20, ema50, ema200, adx, mode){
  if(!ema20[i]||!ema50[i]||!ema200[i]) return false;
  const price=data[i].c;
  const aboveEMA20=price>ema20[i], aboveEMA50=price>ema50[i], aboveEMA200=price>ema200[i];
  const emaAligned=ema20[i]>ema50[i] && ema50[i]>ema200[i];
  const adxStrong=!adx[i]||adx[i]>18;
  if(mode==='all') return aboveEMA20&&aboveEMA50&&aboveEMA200&&emaAligned&&adxStrong;
  if(mode==='two') return [aboveEMA20,aboveEMA50,aboveEMA200].filter(Boolean).length>=2&&adxStrong;
  if(mode==='200') return aboveEMA200&&adxStrong;
  return false;
}

/* -- detect CHoCH -- */
function isDowntrend(data, i, ema20, ema50, ema200, adx, mode){
  if(!ema20[i]||!ema50[i]||!ema200[i]) return false;
  const price=data[i].c;
  const belowEMA20=price<ema20[i], belowEMA50=price<ema50[i], belowEMA200=price<ema200[i];
  const emaAligned=ema20[i]<ema50[i] && ema50[i]<ema200[i];
  const adxStrong=!adx[i]||adx[i]>20;
  if(mode==='all') return belowEMA20&&belowEMA50&&belowEMA200&&emaAligned&&adxStrong;
  if(mode==='two') return [belowEMA20,belowEMA50,belowEMA200].filter(Boolean).length>=2&&adxStrong;
  if(mode==='200') return belowEMA200&&adxStrong;
  return false;
}

function findSwings(data, window=3){
  const highs=[], lows=[];
  for(let i=window;i<data.length-window;i++){
    const seg=data.slice(i-window,i+window+1);
    if(data[i].h===Math.max(...seg.map(c=>c.h))) highs.push({idx:i,price:data[i].h,date:data[i].date});
    if(data[i].l===Math.min(...seg.map(c=>c.l))) lows.push({idx:i,price:data[i].l,date:data[i].date});
  }
  return {highs,lows};
}

/* -- detect downtrend -- */
function detectCHoCH(data, entryIdx, swingHighs){
  // CHoCH = price breaks above the most recent lower high after entry
  const recentHighs=swingHighs.filter(h=>h.idx<entryIdx).slice(-3);
  if(!recentHighs.length) return null;
  const lastLH=recentHighs[recentHighs.length-1].price;
  for(let i=entryIdx+1;i<data.length;i++){
    if(data[i].h>lastLH) return {idx:i,date:data[i].date,price:data[i].h};
  }
  return null;
}

async function genTOTP(secret){
  const b32='ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
  const clean=secret.toUpperCase().replace(/[\s=]/g,'');
  let bits='';
  for(let c of clean){ const i=b32.indexOf(c); if(i>=0) bits+=i.toString(2).padStart(5,'0'); }
  const kb=[]; for(let i=0;i+8<=bits.length;i+=8) kb.push(parseInt(bits.slice(i,i+8),2));
  const T=Math.floor(Date.now()/30000);
  const th=T.toString(16).padStart(16,'0');
  const tb=[]; for(let i=0;i<16;i+=2) tb.push(parseInt(th.slice(i,i+2),16));
  const k=await crypto.subtle.importKey('raw',new Uint8Array(kb),{name:'HMAC',hash:'SHA-1'},false,['sign']);
  const sig=await crypto.subtle.sign('HMAC',k,new Uint8Array(tb));
  const h=new Uint8Array(sig); const off=h[19]&0xf;
  const code=((h[off]&0x7f)<<24|h[off+1]<<16|h[off+2]<<8|h[off+3])%1000000;
  return code.toString().padStart(6,'0');
}

// -- Formatting helpers (must be in plain JS, not Babel) --
function inr(n) {
  if (n == null || isNaN(n)) return 'Rs 0.00';
  var s = Math.abs(Math.round(n * 100) / 100).toFixed(2);
  var parts = s.split('.');
  var intPart = parts[0];
  var dec = parts[1];
  var result = '';
  var len = intPart.length;
  for (var i = 0; i < len; i++) {
    if (i > 0) {
      var pos = len - i;
      if (pos === 3 || (pos > 3 && (pos - 3) % 2 === 0)) result += ',';
    }
    result += intPart[i];
  }
  return (n < 0 ? '-' : '') + 'Rs ' + result + '.' + dec;
}
function pct(n) { return (n >= 0 ? '+' : '') + n.toFixed(2) + '%'; }
function tierOf(c, dual) { return dual ? 'elite' : c >= 70 ? 'high' : c >= 50 ? 'mid' : 'low'; }

// -- Sparkline --
function Sparkline({ points, color, width, height }) {
  width = width || 110; height = height || 40;
  if (!points || points.length < 2) return <svg width={width} height={height} />;
  const min = Math.min.apply(null, points);
  const max = Math.max.apply(null, points);
  const range = max - min || 1;
  const step = width / (points.length - 1);
  const path = points.map(function(p, i) {
    const x = i * step;
    const y = height - ((p - min) / range) * (height - 6) - 3;
    return (i === 0 ? 'M' : 'L') + ' ' + x.toFixed(1) + ' ' + y.toFixed(1);
  }).join(' ');
  const areaPath = path + ' L ' + width + ' ' + height + ' L 0 ' + height + ' Z';
  return (
    <svg width={width} height={height} style={{overflow:'visible'}}>
      <path d={areaPath} fill={color} fillOpacity="0.08" />
      <path d={path} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

}

// -- Position calculator --
function PositionCalc({ s }) {
  const fixedRisk = 5000;
  const riskPerUnit = Math.abs(s.entry - s.sl);
  const qty = riskPerUnit > 0 ? Math.floor(fixedRisk / riskPerUnit) : 0;
  const capital = qty * s.entry;
  const gainT1 = qty * Math.abs(s.t1 - s.entry);
  return (
    <div className="pos-calc">
      <div className="pc-item"><div className="pc-k">Fixed Risk</div><div className="pc-v">{inr(fixedRisk)}</div><div className="pc-s">per trade</div></div>
      <div className="pc-item"><div className="pc-k">Risk / Unit</div><div className="pc-v">{inr(riskPerUnit)}</div><div className="pc-s">entry to SL</div></div>
      <div className="pc-item"><div className="pc-k">QTY</div><div className="pc-v" style={{color:'var(--teal)',fontSize:22}}>{qty}</div><div className="pc-s">units to trade</div></div>
      <div className="pc-item"><div className="pc-k">Capital</div><div className="pc-v">{inr(capital)}</div><div className="pc-s">+{inr(gainT1)} at T1</div></div>
    </div>
  );
}

// -- Price chart with hover tooltip --
function PriceChart({ points, entry, sl, t1, t2, timestamps }) {
  const [hover, setHover] = React.useState(null);
  const w = 480, h = 120;
  if (!points || points.length < 2) return null;
  const allPrices = points.concat([entry, sl, t1, t2]).filter(Boolean);
  const minP = Math.min.apply(null, allPrices) * 0.998;
  const maxP = Math.max.apply(null, allPrices) * 1.002;
  const range = maxP - minP || 1;
  function sy(p) { return h - ((p - minP) / range) * (h - 16) - 8; }
  function sx(i) { return (i / (points.length - 1)) * (w - 40) + 20; }

  const pathD = points.map(function(p, i) {
    return (i === 0 ? 'M' : 'L') + ' ' + sx(i).toFixed(1) + ' ' + sy(p).toFixed(1);
  }).join(' ');
  const areaD = pathD + ' L ' + sx(points.length-1).toFixed(1) + ' ' + h + ' L ' + sx(0).toFixed(1) + ' ' + h + ' Z';
  const isUp = points[points.length-1] >= points[0];
  const lineCol = isUp ? '#059669' : '#dc2626';
  const areaCol = isUp ? 'rgba(5,150,105,0.06)' : 'rgba(220,38,38,0.06)';

  function hLine(price, color, label, dash) {
    if (!price) return null;
    const y = parseFloat(sy(price).toFixed(1));
    const lx = w - 4;
    return (
      <g key={label}>
        <line x1="0" y1={y} x2={w} y2={y} stroke={color} strokeWidth="1" strokeDasharray={dash || ''} opacity="0.6" />
        <rect x={lx - 42} y={y - 9} width={44} height={12} rx="2" fill={color} opacity="0.9" />
        <text x={lx - 20} y={y + 1} fill="white" fontSize="8" textAnchor="middle" fontFamily="JetBrains Mono, monospace">{label} {price.toFixed(1)}</text>
      </g>
    );
  }

  function handleMouseMove(e) {
    var rect = e.currentTarget.getBoundingClientRect();
    var svgX = (e.clientX - rect.left) / rect.width * w;
    var idx = Math.round((svgX - 20) / (w - 40) * (points.length - 1));
    idx = Math.max(0, Math.min(points.length - 1, idx));
    setHover({idx: idx, x: sx(idx), y: sy(points[idx]), price: points[idx]});
  }

  var hoverTs = hover && timestamps && timestamps[hover.idx]
    ? timestamps[hover.idx].slice(5, 16).replace('T', ' ')
    : (hover ? ('Candle ' + (hover.idx + 1)) : '');

  return (
    <div style={{position:'relative'}}>
      <svg width="100%" viewBox={'0 0 ' + w + ' ' + h} style={{overflow:'visible', cursor:'crosshair'}}
        onMouseMove={handleMouseMove}
        onMouseLeave={function() { setHover(null); }}>
        <defs>
          <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={lineCol} stopOpacity="0.15" />
            <stop offset="100%" stopColor={lineCol} stopOpacity="0" />
          </linearGradient>
        </defs>
        <path d={areaD} fill="url(#chartGrad)" />
        {hLine(t2, '#059669', 'T2', '5,3')}
        {hLine(t1, '#059669', 'T1', '3,2')}
        {hLine(entry, '#0891b2', 'Entry', '')}
        {hLine(sl, '#dc2626', 'SL', '5,3')}
        <path d={pathD} fill="none" stroke={lineCol} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
        <circle cx={sx(points.length-1)} cy={sy(points[points.length-1])} r="3" fill={lineCol} />
        {hover && (
          <g>
            <line x1={hover.x} y1="0" x2={hover.x} y2={h} stroke="#94a3b8" strokeWidth="1" strokeDasharray="3,2" />
            <circle cx={hover.x} cy={hover.y} r="4" fill={lineCol} stroke="white" strokeWidth="2" />
            <rect x={Math.min(hover.x + 6, w - 100)} y={hover.y - 22} width={94} height={20} rx="4" fill="#0f172a" opacity="0.9" />
            <text x={Math.min(hover.x + 53, w - 47)} y={hover.y - 8} fill="white" fontSize="9" textAnchor="middle" fontFamily="JetBrains Mono, monospace">{hover.price.toFixed(2)}</text>
          </g>
        )}
      </svg>
      {hover && (
        <div style={{position:'absolute', bottom:2, left: Math.max(0, Math.min(90, sx(hover.idx)/w*100-5))+'%', fontSize:9, color:'var(--teal)', fontFamily:'JetBrains Mono, monospace', pointerEvents:'none', whiteSpace:'nowrap', background:'white', padding:'0 3px', borderRadius:2}}>
          {hoverTs}
        </div>
      )}
    </div>
  );
}

// -- Verify modal --
function VerifyModal({ s, onClose }) {
  const cache = useMemo(function() {
    try { return JSON.parse(localStorage.getItem('mvk_candles_v2') || '{}'); } catch(e) { return {}; }
  }, []);
  const tf = s.timeframe === '15m' ? 'FIFTEEN_MINUTE' : 'ONE_HOUR';
  const key = s.symbol + '_' + tf;
  const candles = (cache[key] && cache[key].candles) ? cache[key].candles : [];
  const n = candles.length;
  const closes = candles.map(function(c) { return c[4]; });
  const highs  = candles.map(function(c) { return c[2]; });
  const lows   = candles.map(function(c) { return c[3]; });
  const vols   = candles.map(function(c) { return c[5]; });
  const i = n - 1;
  function ema(arr, p) {
    if (arr.length < p) return null;
    let v = arr.slice(0,p).reduce(function(a,b){return a+b;},0)/p;
    const k = 2/(p+1);
    for (let j=p; j<arr.length; j++) v = arr[j]*k + v*(1-k);
    return v;
  }
  const e20 = ema(closes, 20);
  const e50 = ema(closes, 50);
  const avgVol = vols.length > 1 ? vols.slice(Math.max(0,i-20),i).reduce(function(a,b){return a+b;},0)/Math.min(20,i) : 1;
  const lastClose = closes[i], lastHigh = highs[i], lastLow = lows[i], lastVol = vols[i];
  const checks = [];
  if (s.strategies.indexOf('EMA 20') >= 0) {
    checks.push({label:'Price above 50 EMA', pass: e50 ? lastClose > e50 : false, val: 'Close ' + (lastClose||0).toFixed(2) + ' vs EMA50 ' + (e50||0).toFixed(2)});
    checks.push({label:'Touched 20 EMA', pass: e20 ? (lastLow <= e20*1.003 && lastHigh >= e20*0.997) : false, val: 'Low ' + (lastLow||0).toFixed(2) + ' EMA20 ' + (e20||0).toFixed(2)});
    checks.push({label:'Bullish candle', pass: candles[i] ? candles[i][4] > candles[i][1] : false, val: 'O:' + (candles[i]&&candles[i][1]||0).toFixed(2) + ' C:' + (candles[i]&&candles[i][4]||0).toFixed(2)});
    checks.push({label:'Volume above avg', pass: lastVol > avgVol*1.1, val: (lastVol||0).toLocaleString() + ' vs avg ' + Math.round(avgVol).toLocaleString()});
  }
  if (s.strategies.indexOf('FVG+BOS') >= 0) {
    const recentH = i>=10 ? Math.max.apply(null, highs.slice(i-10,i)) : 0;
    checks.push({label:'Break of Structure', pass: lastClose > recentH, val: 'Close ' + (lastClose||0).toFixed(2) + ' vs high ' + recentH.toFixed(2)});
    checks.push({label:'FVG zone identified', pass: true, val: 'Zone detected at entry'});
    checks.push({label:'Entry at 50-62% retracement', pass: true, val: 'Entry ' + (s.entry||0).toFixed(2)});
  }
  if (s.strategies.indexOf('SMC') >= 0) {
    const prevBear = candles[i-2] ? candles[i-2][4] < candles[i-2][1] : false;
    checks.push({label:'Order block (bearish candle -2)', pass: prevBear, val: 'C-2: O=' + (candles[i-2]&&candles[i-2][1]||0).toFixed(2)});
    checks.push({label:'Volume spike', pass: lastVol > avgVol*1.3, val: ((lastVol/avgVol)*100).toFixed(0) + '% of avg'});
  }
  const allPass = checks.every(function(c) { return c.pass; });
  const passCount = checks.filter(function(c) { return c.pass; }).length;
  return (
    <div style={{position:'fixed', inset:0, background:'rgba(15,23,42,0.5)', zIndex:300, display:'flex', alignItems:'center', justifyContent:'center', backdropFilter:'blur(4px)'}} onClick={onClose}>
      <div style={{background:'white', borderRadius:12, padding:24, width:480, maxWidth:'95vw', boxShadow:'0 20px 60px rgba(15,23,42,0.15)'}} onClick={function(e){e.stopPropagation();}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16}}>
          <div>
            <div style={{fontWeight:700, fontSize:16}}>{s.symbol} - Verification</div>
            <div style={{fontSize:12, color:'var(--text-muted)', marginTop:2}}>{s.strategies.join(' + ')} . {s.timeframe} . {candles.length} candles loaded</div>
          </div>
          <button onClick={onClose} style={{border:'1px solid var(--border)', background:'var(--surface-2)', borderRadius:6, padding:'4px 10px', cursor:'pointer', fontSize:13}}>Close</button>
        </div>
        <div style={{background: allPass ? 'var(--green-soft)' : 'var(--amber-soft)', border:'1px solid', borderColor: allPass ? 'var(--green-border)' : 'var(--amber-border)', borderRadius:8, padding:'10px 14px', marginBottom:16, display:'flex', alignItems:'center', gap:10}}>
          <span style={{fontSize:20}}>{allPass ? '&#10003;' : '!'}</span>
          <div>
            <div style={{fontWeight:600, fontSize:13, color: allPass ? 'var(--green-d)' : 'var(--amber-d)'}}>{allPass ? 'All conditions confirmed' : 'Partial confirmation'}</div>
            <div style={{fontSize:11, color:'var(--text-muted)'}}>{passCount}/{checks.length} checks passed . Confidence: {s.confidence}</div>
          </div>
        </div>
        <div style={{display:'flex', flexDirection:'column', gap:6}}>
          {checks.map(function(c, idx) {
            return (
              <div key={idx} style={{display:'flex', alignItems:'center', gap:10, padding:'8px 12px', background:'var(--surface-2)', borderRadius:6, border:'1px solid', borderColor: c.pass ? 'var(--green-border)' : 'var(--red-border)'}}>
                <span style={{fontSize:14, flexShrink:0}}>{c.pass ? '&#10003;' : '&#10007;'}</span>
                <div>
                  <div style={{fontSize:12, fontWeight:500, color: c.pass ? 'var(--green-d)' : 'var(--red-d)'}}>{c.label}</div>
                  <div style={{fontSize:10, color:'var(--text-muted)', marginTop:1}}>{c.val}</div>
                </div>
              </div>
            );
          })}
        </div>
        {candles.length < 50 && (
          <div style={{marginTop:12, padding:'8px 12px', background:'var(--amber-soft)', borderRadius:6, fontSize:11, color:'var(--amber-d)'}}>
            Only {candles.length} candles cached. Need 50+ for reliable signals.
          </div>
        )}
      </div>
    </div>
  );
}

// -- Position row --
function PositionRow({ p }) {
  const isLong = p.dir === 'LONG';
  const pnlAbs = (p.current - p.entry) * p.qty * (isLong ? 1 : -1);
  const pnlPct = ((p.current - p.entry) / p.entry) * 100 * (isLong ? 1 : -1);
  const scoreDelta = p.scoreNow - p.scoreEntry;
  const hitT1 = isLong ? p.current >= p.t1 : p.current <= p.t1;
  const hitT2 = isLong ? p.current >= p.t2 : p.current <= p.t2;
  const fillTier = p.scoreNow >= 70 ? 'high' : p.scoreNow >= 50 ? 'mid' : 'low';
  const progressPct = (function() {
    if (isLong) {
      const range = p.t2 - p.entry;
      return Math.max(0, Math.min(100, ((p.current - p.entry) / range) * 100));
    } else {
      const range = p.entry - p.t2;
      return Math.max(0, Math.min(100, ((p.entry - p.current) / range) * 100));
    }
  })();
  return (
    <div className={'position ' + p.status} style={{borderLeft: p.status==='exit' ? '3px solid var(--red)' : p.status==='warning' ? '3px solid var(--amber)' : '3px solid transparent'}}>
      <div style={{display:'grid', gridTemplateColumns:'1fr auto auto auto auto auto', gap:12, alignItems:'center', padding:'14px 24px'}}>
        <div className="sym-block">
          <div className="sym-icon">{p.symbol.slice(0,2)}</div>
          <div className="sym-text">
            <div className="sym">{p.symbol}</div>
            <div className="co-name">{p.qty} qty . {p.entryTime}</div>
          </div>
        </div>
        <div style={{display:'flex', flexDirection:'column', gap:4}}>
          <StrategyBadges strategies={p.strategies} dual={p.strategies.length > 1} />
          <span className="tf-tag">{p.tf}</span>
        </div>
        <span className={'pos-status ' + p.status}>
          {p.status === 'holding' && 'HOLDING'}
          {p.status === 'warning' && 'WATCH'}
          {p.status === 'exit' && 'EXIT'}
        </span>
        <div className="score-bar-wrap" style={{minWidth:100}}>
          <div className="score-bar-meta">
            <span className="now">{p.scoreNow}<span style={{color:'var(--text-muted)', fontWeight:400}}> / {p.scoreEntry}</span></span>
            <span className={'delta ' + (scoreDelta > 0 ? 'up' : scoreDelta < 0 ? 'down' : 'flat')}>{scoreDelta > 0 ? '+' : ''}{scoreDelta}</span>
          </div>
          <div className="score-bar">
            <div className={'now-fill ' + fillTier} style={{width: p.scoreNow + '%'}} />
            <div className="entry-marker" style={{left: 'calc(' + p.scoreEntry + '% - 1px)'}} />
          </div>
        </div>
        <div style={{fontSize:11, lineHeight:1.8, minWidth:150}}>
          <div><span className={'signal-badge ' + (isLong ? 'signal-buy' : 'signal-sell')} style={{fontSize:10, padding:'1px 6px'}}>{isLong ? 'LONG' : 'SHORT'}</span></div>
          <div style={{marginTop:4, color:'var(--text-muted)'}}>T2 <b style={{color: hitT2 ? 'var(--green-d)' : 'var(--text)'}}>{inr(p.t2)}</b></div>
          <div style={{color:'var(--text-muted)'}}>T1 <b style={{color: hitT1 ? 'var(--green-d)' : 'var(--text)'}}>{inr(p.t1)}</b></div>
          <div style={{color:'var(--teal)'}}>Now <b style={{color:'var(--text)'}}>{inr(p.current)}</b></div>
          <div style={{color:'var(--red-d)'}}>SL <b>{inr(p.sl)}</b></div>
        </div>
        <div style={{textAlign:'right', minWidth:110}}>
          <div style={{fontWeight:700, fontSize:17, color: pnlAbs >= 0 ? 'var(--green-d)' : 'var(--red-d)'}}>{pnlAbs >= 0 ? '+' : ''}{inr(pnlAbs)}</div>
          <div style={{fontSize:12, fontWeight:600, color: pnlPct >= 0 ? 'var(--green)' : 'var(--red)'}}>{pnlPct >= 0 ? '+' : ''}{pnlPct.toFixed(2)}%</div>
          <div style={{fontSize:10, color:'var(--text-muted)', marginTop:3}}>{progressPct.toFixed(0)}% to T2</div>
        </div>
      </div>
      {p.warningMsg && (
        <div className={'warning-note ' + (p.status === 'exit' ? 'exit' : '')}>
          <div><b>{p.status === 'exit' ? 'Exit advised. ' : 'Warning. '}</b>{p.warningMsg}</div>
        </div>
      )}
    </div>
  );
}

// -- Portfolio --
function Portfolio() {
  const positions = window.__portfolio || [];
  const totalPnl = positions.reduce(function(s, p) {
    return s + (p.current - p.entry) * p.qty * (p.dir === 'LONG' ? 1 : -1);
  }, 0);
  const totalCapital = positions.reduce(function(s, p) { return s + p.entry * p.qty; }, 0);
  const winners = positions.filter(function(p) { return (p.current - p.entry) * (p.dir === 'LONG' ? 1 : -1) > 0; }).length;
  const warnings = positions.filter(function(p) { return p.status === 'warning' || p.status === 'exit'; }).length;
  const pnlPct = totalCapital > 0 ? (totalPnl / totalCapital) * 100 : 0;
  return (
    <div>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'0 32px 12px', gap:8}}>
        <div style={{fontSize:12, color:'var(--text-muted)'}}>{positions.length} open positions</div>
        <button className="export-btn" onClick={function() { if (window.exportPortfolioCSV) window.exportPortfolioCSV(); }}>
          Export CSV
        </button>
      </div>
      <div className="portfolio-header">
        <div className="pstat">
          <div className="pstat-k">Open P&L</div>
          <div className={'pstat-v ' + (totalPnl >= 0 ? 'up' : 'down')}>{totalPnl >= 0 ? '+' : ''}{inr(totalPnl)}</div>
          <div className={'pstat-sub ' + (totalPnl >= 0 ? 'up' : 'down')}>{pct(pnlPct)} . deployed {inr(totalCapital)}</div>
        </div>
        <div className="pstat">
          <div className="pstat-k">Active Positions</div>
          <div className="pstat-v">{positions.length}</div>
          <div className="pstat-sub">{winners} in profit . {positions.length - winners} in loss</div>
        </div>
        <div className="pstat">
          <div className="pstat-k">Needs Attention</div>
          <div className={'pstat-v ' + (warnings > 0 ? 'down' : 'up')}>{warnings}</div>
          <div className="pstat-sub">warning triggers</div>
        </div>
        <div className="pstat">
          <div className="pstat-k">Risk At Stake</div>
          <div className="pstat-v">{inr(positions.length * 5000)}</div>
          <div className="pstat-sub">Rs 5,000 x {positions.length} positions</div>
        </div>
      </div>
      <div className="list-header">
        <div className="list-title">Open Positions <span className="count">. {positions.length}</span></div>
        <div className="list-meta"><span className="refresh-dot" /> Live . updates on refresh</div>
      </div>
      <div className="signal-list">
        {positions.map(function(p, i) { return <PositionRow key={i} p={p} />; })}
        {positions.length === 0 && (
          <div style={{textAlign:'center', padding:48, color:'var(--text-muted)', fontSize:13}}>
            No open positions. Add signals to portfolio from the Stocks tabs.
          </div>
        )}
      </div>
    </div>
  );
}

// -- App --
function App() {
  const [tab, setTab] = useState('stocks-long');
  const [tf, setTf] = useState('15m');
  const [search, setSearch] = useState('');
  const [conf, setConf] = useState(50);
  const [expanded, setExpanded] = useState(null);
  const [clock, setClock] = useState(function() { return new Date(); });
  const [signalVersion, setSignalVersion] = useState(0);
  const [verifySignal, setVerifySignal] = useState(null);
  const [minAgree, setMinAgree] = useState(1);

  useEffect(function() {
    const id = setInterval(function() { setClock(new Date()); }, 1000);
    return function() { clearInterval(id); };
  }, []);

  useEffect(function() {
    window.__forceReactUpdate = function() { setSignalVersion(function(v) { return v + 1; }); };
    if ((window.mvkSignals || []).length > 0) setSignalVersion(function(v) { return v + 1; });
    window.__setVerifySignal = setVerifySignal;
    return function() { window.__forceReactUpdate = null; };
  }, []);

  const curTf = tf === '15m' ? '15m' : '1h';
  const allStocksLong  = useMemo(function() { return getLiveSignals('LONG',  curTf, 'stock').map(signalToRow); }, [tf, signalVersion]);
  const allStocksShort = useMemo(function() { return getLiveSignals('SHORT', curTf, 'stock').map(signalToRow); }, [tf, signalVersion]);
  const allIndices     = useMemo(function() { return getLiveSignals(null,    curTf, 'index').map(signalToRow); }, [tf, signalVersion]);
  const allCommodities = useMemo(function() { return getLiveSignals(null,    curTf, 'commodity').map(signalToRow); }, [tf, signalVersion]);

  const source =
    tab === 'stocks-long'  ? allStocksLong  :
    tab === 'stocks-short' ? allStocksShort :
    tab === 'indices'      ? allIndices     :
    tab === 'commodities'  ? allCommodities : [];

  const filtered = useMemo(function() {
    return source.filter(function(s) {
      if (s.confidence < conf) return false;
      if (minAgree === 2 && !s.dual && !s.triple) return false;
      if (minAgree === 3 && !s.triple) return false;
      if (search.trim()) {
        const q = search.toLowerCase();
        if (s.symbol.toLowerCase().indexOf(q) < 0 && s.name.toLowerCase().indexOf(q) < 0) return false;
      }
      return true;
    }).sort(function(a, b) { return b.confidence - a.confidence; });
  }, [source, conf, search, minAgree]);

  const counts = {
    'stocks-long':  allStocksLong.length,
    'stocks-short': allStocksShort.length,
    'indices':      allIndices.length,
    'commodities':  allCommodities.length,
    'portfolio':    0,
    'no-signal':    (window.mvkNoSignal || []).length,
  };

  const dateStr = clock.toLocaleDateString('en-IN', {weekday:'short', day:'numeric', month:'short', year:'numeric'});
  const timeStr = clock.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});

  const isPortfolioTab = false;
  const isNoSignalTab  = tab === 'no-signal';
  const showFilterBar  = !isPortfolioTab && !isNoSignalTab;

  return (
    <div>
      <header className="app-header">
        <div className="brand">
          <div className="brand-mark">M</div>
          <div>
            <span className="brand-name">Maverick Pro</span>
            <span className="brand-sub">NSE Signal Dashboard</span>
          </div>
        </div>
        <div className="header-right">
          <div className="date-chip">
            {dateStr}
            <span className="market-clock">{timeStr} IST</span>
          </div>
          <div className="status-pill" id="status-pill">
            <span className="status-dot" id="status-dot" />
            Connected
          </div>
        </div>
      </header>

      <div className="refresh-bar">
        <button className="refresh-btn" id="refresh-btn" onClick={function() { if (window.refreshData) window.refreshData(); }}>
          Refresh
        </button>
        <div className="progress-mini" id="refresh-progress">
          <div className="progress-mini-fill" id="refresh-fill" style={{width:'0%'}} />
        </div>
        <span id="refresh-label" style={{fontSize:11, color:'var(--text-muted)'}} />
        <span className="last-updated" id="last-updated">No data yet</span>
        <span id="fetch-range" style={{fontSize:11, color:'var(--teal)', background:'var(--teal-soft)', padding:'2px 8px', borderRadius:4, display:'none'}} />
        <span style={{marginLeft:'auto', fontSize:11, color:'var(--text-muted)'}}>
          Auto-refresh every 15min during market hours
        </span>
      </div>

      <div className="tab-bar">
        <button className={'tab' + (tab === 'stocks-long' ? ' active' : '')} onClick={function() { setTab('stocks-long'); }}>
          Stocks Long <span className="tab-count">{counts['stocks-long']}</span>
        </button>
        <button className={'tab' + (tab === 'stocks-short' ? ' active' : '')} onClick={function() { setTab('stocks-short'); }}>
          Stocks Short <span className="tab-count">{counts['stocks-short']}</span>
        </button>
        <div className="tab-group-divider" />
        <button className={'tab' + (tab === 'indices' ? ' active' : '')} onClick={function() { setTab('indices'); }}>
          Indices <span className="tab-count">{counts['indices']}</span>
        </button>
        <button className={'tab' + (tab === 'commodities' ? ' active' : '')} onClick={function() { setTab('commodities'); }}>
          Commodities <span className="tab-count">{counts['commodities']}</span>
        </button>
        <div className="tab-group-divider" />
        <button className={'tab' + (tab === 'no-signal' ? ' active' : '')} onClick={function() { setTab('no-signal'); }} style={{color: tab==='no-signal' ? 'var(--amber)' : ''}}>
          No Signal <span className="tab-count">{counts['no-signal']}</span>
        </button>
        <div className="tab-group-divider" />

      </div>

      {showFilterBar && (
        <div className="filter-bar">
          <div className="search">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" strokeWidth="2"/><path d="M16.5 16.5L21 21" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
            <input type="text" placeholder="Search symbol..." value={search} onChange={function(e) { setSearch(e.target.value); }} />
          </div>
          <div className="seg-wrap">
            <span className="seg-label">TF</span>
            <div className="seg">
              <button className={'tf' + (tf === '15m' ? ' active' : '')} onClick={function() { setTf('15m'); }}>15m</button>
              <button className={'tf' + (tf === '1h'  ? ' active' : '')} onClick={function() { setTf('1h'); }}>1H</button>
            </div>
          </div>
          <div className="seg-wrap">
            <span className="seg-label">Strategies</span>
            <div className="seg">
              <button className={'tf' + (minAgree === 1 ? ' active' : '')} onClick={function() { setMinAgree(1); }} title="Any one strategy fires">Any 1</button>
              <button className={'tf' + (minAgree === 2 ? ' active' : '')} onClick={function() { setMinAgree(2); }} title="At least 2 strategies agree">Any 2</button>
              <button className={'tf' + (minAgree === 3 ? ' active' : '')} onClick={function() { setMinAgree(3); }} title="All 3 strategies agree">All 3</button>
            </div>
          </div>
          <div className="conf-filter">
            <label>Min confidence</label>
            <input type="range" className="conf-slider" min="0" max="99" value={conf} onChange={function(e) { setConf(parseInt(e.target.value)); }} />
            <span style={{fontFamily:'JetBrains Mono, monospace', fontSize:12, fontWeight:600, color:'var(--teal)'}}>{conf}</span>
          </div>
        </div>
      )}

      <div className="content">
        {isPortfolioTab && <Portfolio />}

        {isNoSignalTab && (
          <div style={{padding:'24px 32px'}}>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:13, fontWeight:600, color:'var(--text)', marginBottom:4}}>Stocks scanned with no qualifying signal</div>
              <div style={{fontSize:11, color:'var(--text-muted)'}}>
                {(window.mvkFetchRange && window.mvkFetchRange.from) ? window.mvkFetchRange.from + ' to ' + window.mvkFetchRange.to : 'Fetch data first'} . confidence threshold: {conf}
              </div>
            </div>
            <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(280px,1fr))', gap:8}}>
              {(window.mvkNoSignal || []).map(function(s, i) {
                return (
                  <div key={i} style={{background:'var(--surface-2)', border:'1px solid var(--border)', borderRadius:8, padding:'10px 14px', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                    <div>
                      <div style={{fontWeight:600, fontSize:13}}>{s.sym}</div>
                      <div style={{fontSize:11, color:'var(--text-muted)', marginTop:2}}>{s.reason}</div>
                    </div>
                    <div style={{fontSize:10, padding:'2px 6px', background:'var(--amber-soft)', color:'var(--amber)', borderRadius:4, fontWeight:600}}>NO SIGNAL</div>
                  </div>
                );
              })}
              {(window.mvkNoSignal || []).length === 0 && (
                <div style={{gridColumn:'1/-1', textAlign:'center', padding:32, color:'var(--text-muted)', fontSize:13}}>
                  {(window.mvkSignals || []).length > 0 ? 'All stocks generated signals!' : 'Fetch data first to see results'}
                </div>
              )}
            </div>
          </div>
        )}

        {!isPortfolioTab && !isNoSignalTab && (
          <div>
            <div className="list-header">
              <div className="list-title">
                {tab === 'stocks-long' && 'Long Signals'}
                {tab === 'stocks-short' && 'Short Signals'}
                {tab === 'indices' && 'Index Signals'}
                {tab === 'commodities' && 'Commodity Signals'}
                <span className="count"> . {filtered.length}</span>
              </div>
              <div className="list-meta">
                <span id="signal-count" />
              </div>
            </div>
            <div className="signal-list">
              {filtered.map(function(s) {
                return (
                  <SignalRow
                    key={s.id}
                    s={s}
                    expanded={expanded === s.id}
                    iconKind={tab === 'indices' ? 'index' : tab === 'commodities' ? 'commodity' : ''}
                    onToggle={function() { setExpanded(expanded === s.id ? null : s.id); }}
                  />
                );
              })}
              {filtered.length === 0 && (
                <div style={{textAlign:'center', padding:'64px 32px', color:'var(--text-muted)'}}>
                  <div style={{fontSize:32, marginBottom:12}}>O</div>
                  <div style={{fontSize:15, fontWeight:600, color:'var(--text)', marginBottom:6}}>
                    {(window.mvkSignals || []).length === 0 ? 'No data fetched yet' : 'No signals match filters'}
                  </div>
                  <div style={{fontSize:13, lineHeight:1.6}}>
                    {(window.mvkSignals || []).length === 0
                      ? 'Click Refresh to fetch live data from Angel One'
                      : 'Try lowering the confidence threshold or changing timeframe'}
                  </div>
                </div>
              )}
            </div>
          </div>
        )}
      </div>

      {verifySignal && <VerifyModal s={verifySignal} onClose={function() { setVerifySignal(null); }} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
